name: Build iOS Unsigned IPA and Publish to Pre-Releases

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-ios-pre-release.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0-ios). Leave empty for auto-generated.'
        required: false
        type: string
      release_name:
        description: 'Release name. Leave empty for auto-generated.'
        required: false
        type: string

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-latest
    name: Build Unsigned iOS IPA
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle and Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-konan-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework (Device)
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install xcodegen

      - name: Prepare Xcode Project
        run: |
          cd iosApp
          
          # Create project.yml for xcodegen
          cat > project.yml << 'EOF'
          name: GoedVoorGoed
          targets:
            GoedVoorGoed:
              type: application
              platform: iOS
              deploymentTarget: "13.0"
              sources:
                - GoedVoorGoed
              settings:
                base:
                  INFOPLIST_FILE: GoedVoorGoed/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.goedvoorgoed.iosApp
                  CODE_SIGNING_ALLOWED: NO
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGN_IDENTITY: ""
                  PROVISIONING_PROFILE: ""
                  PROVISIONING_PROFILE_SPECIFIER: ""
                  SWIFT_VERSION: "5.0"
                  LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
                  FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../shared/build/bin/iosArm64/releaseFramework"
                  OTHER_LDFLAGS: "$(inherited) -framework shared"
                  ARCHS: "arm64"
                  ONLY_ACTIVE_ARCH: NO
                  ENABLE_BITCODE: NO
                  # Override the build output location
                  CONFIGURATION_BUILD_DIR: "$(PROJECT_DIR)/build/Products/$(CONFIGURATION)-$(PLATFORM_NAME)"
              info:
                path: GoedVoorGoed/Info.plist
          EOF
          
          # Generate the Xcode project
          xcodegen generate

      - name: Build for iOS Device
        run: |
          cd iosApp
          
          # Create build directory first
          mkdir -p build/Products
          
          # Build for device (does not require signing for unsigned IPA)
          # Use generic/platform=iOS to build for device architecture
          set -o pipefail
          xcodebuild build \
            -project GoedVoorGoed.xcodeproj \
            -scheme GoedVoorGoed \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath "$(pwd)/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/Products/Release-iphoneos" \
            | xcpretty || cat
          
          # Debug: Show build directory structure
          echo "=== Build directory structure ==="
          find build -type d -name "*.app" 2>/dev/null || echo "No .app directories found"
          ls -la build/Products/ 2>/dev/null || echo "No Products directory"
          
          # Verify the app was built
          if [ ! -d "build/Products/Release-iphoneos/GoedVoorGoed.app" ]; then
            echo "❌ Build failed - app bundle not found"
            echo "=== Build logs location ==="
            find build -name "*.log" 2>/dev/null | head -5
            exit 1
          fi

      - name: Package Unsigned IPA
        run: |
          cd iosApp
          
          # Debug: Show what we have
          echo "=== Contents of build directory ==="
          ls -la build/ 2>/dev/null || echo "No build directory"
          
          echo "=== Searching for .app bundles ==="
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found in build"
          
          # Try to find the built app in known locations
          APP_PATH=""
          
          # Check the Products directory first (where we told xcodebuild to put it)
          if [ -d "build/Products/Release-iphoneos/GoedVoorGoed.app" ]; then
            APP_PATH="build/Products/Release-iphoneos/GoedVoorGoed.app"
            echo "Found app in Products directory"
          fi
          
          # If not found, search more broadly
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "GoedVoorGoed.app" -type d 2>/dev/null | head -n 1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            
            # Create Payload directory
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            
            # Create IPA (unsigned, for device)
            cd build
            zip -r ../GoedVoorGoed-unsigned.ipa Payload
            cd ..
            
            echo "✅ Created unsigned IPA for device (TrollStore compatible)"
            ls -la GoedVoorGoed-unsigned.ipa
          else
            echo "❌ App not found!"
            echo "=== All directories in build ==="
            find build -type d 2>/dev/null | head -50 || true
            exit 1
          fi

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: |
            iosApp/GoedVoorGoed-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "=== iOS Unsigned IPA Build Summary ==="
          ls -la iosApp/*.ipa 2>/dev/null || echo "No IPA found"
          echo "======================================"

  publish-pre-release:
    runs-on: ubuntu-latest
    name: Publish to Pre-Releases
    needs: build-ios-unsigned-ipa
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ios-build

      - name: Generate Release Info
        id: release-info
        run: |
          # Auto-generate tag if not provided
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="ios-$(date +'%Y.%m.%d')-${{ github.run_number }}"
          fi
          
          # Auto-generate name if not provided
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            NAME="${{ github.event.inputs.release_name }}"
          else
            NAME="iOS Pre-Release $(date +'%Y-%m-%d') - Build ${{ github.run_number }}"
          fi
          
          # Generate release notes
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=$(echo $COMMIT_SHA | cut -c1-7)
          
          NOTES="## iOS Unsigned IPA Pre-Release
          
          This pre-release contains an **unsigned iOS IPA** that can be sideloaded onto iOS devices.
          
          ### Build Information
          - **Build Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')
          - **Commit:** \`$SHORT_SHA\`
          - **Branch:** ${{ github.ref_name }}
          - **Target:** iOS Device (arm64) - TrollStore compatible
          - **Min iOS Version:** 13.0
          
          ### Features
          This IPA includes the same UI look and feel as the Android app:
          - **Home Screen** - Welcome page with quick navigation
          - **GOED Nieuws!** - Latest news from goedvoorgoed.nl with article viewer
          - **Halen & Brengen** - Pickup and delivery locations with contact info
          - **Cherity Re-Use** - Information about the charity program
          - **Openingstijden** - Opening hours for all locations
          - **Contact** - Contact information for all locations
          
          ### Installation Instructions
          
          To install this unsigned IPA on a **real iOS device**, you can use one of the following methods:
          
          #### Option 1: AltStore (Recommended - Free)
          1. Install AltStore on your iOS device from [altstore.io](https://altstore.io)
          2. Download this IPA to your computer
          3. Connect your device and use AltServer to sideload the IPA
          4. The app will need to be refreshed every 7 days (or use a paid developer account for 1 year)
          
          #### Option 2: Sideloadly (Free)
          1. Download Sideloadly from [sideloadly.io](https://sideloadly.io)
          2. Connect your iOS device to your computer
          3. Drag and drop the IPA into Sideloadly
          4. Enter your Apple ID credentials
          5. Install the app on your device
          
          #### Option 3: TrollStore (iOS 14.0 - 17.0) ⭐ RECOMMENDED
          For devices running iOS 14.0 - 17.0, TrollStore allows **permanent installation without re-signing**.
          
          **Compatible devices include:**
          - iPhone 6s, 6s Plus, SE (1st gen) - iOS 14.0-15.x
          - iPhone 7, 7 Plus - iOS 14.0-15.x  
          - iPhone 8, 8 Plus, X - iOS 14.0-16.x
          - iPhone XS, XR and newer - iOS 14.0-17.0
          
          ### Important Notes
          - ⚠️ This is an **unsigned** IPA and requires sideloading
          - 📱 Compatible with iOS 13.0 and later (iPhone 7 and newer)
          - 🔄 With AltStore/Sideloadly: App needs refreshing every 7 days (free Apple ID)
          - ✅ With TrollStore: Permanent install, no re-signing needed
          - 🚫 Not available on the App Store
          
          ---
          *This is a pre-release. Features and functionality may change.*"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          
          # Write multi-line release notes
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create/Update Pre-Release
        id: create-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.name }}
          body: ${{ steps.release-info.outputs.notes }}
          draft: false
          prerelease: true
          files: ios-build/*.ipa
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summary
        if: always()
        run: |
          echo "=========================================="
          echo "📱 iOS Pre-Release Summary"
          echo "=========================================="
          if [ "${{ steps.create-release.outputs.url }}" != "" ]; then
            echo "✅ Pre-Release Published!"
            echo "🔗 URL: ${{ steps.create-release.outputs.url }}"
            echo "🏷️  Tag: ${{ steps.release-info.outputs.tag }}"
          else
            echo "❌ Pre-release creation failed"
          fi
          echo ""
          echo "📦 IPA included:"
          find ios-build -name "*.ipa" -type f 2>/dev/null || echo "None found"
          echo "=========================================="
