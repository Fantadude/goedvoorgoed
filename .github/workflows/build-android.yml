name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [ main ]
    paths:
      - 'composeApp/**'
      - 'shared/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Debug Secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "KEYSTORE_BASE64 is EMPTY"
          else
            echo "KEYSTORE_BASE64 exists"
          fi

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --info | grep -E "(signing|Sign|KEYSTORE)" || true

      - name: Decode Keystore for Release Signing
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 -d > composeApp/release.keystore
            echo "Keystore decoded successfully"
            ls -la composeApp/release.keystore
          else
            echo "No keystore secret found - will build unsigned release APK"
          fi

      - name: Verify Keystore
        run: |
          if [ -f "composeApp/release.keystore" ]; then
            echo "Keystore file exists"
            ls -la composeApp/release.keystore
          else
            echo "Keystore file not found"
          fi

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: composeApp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "composeApp/release.keystore" ]; then
            echo "Keystore found, building SIGNED release APK..."
            ./gradlew :composeApp:assembleRelease
          else
            echo "No keystore found, building UNSIGNED release APK..."
            ./gradlew :composeApp:assembleRelease
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "=== Android Build Complete ==="
          echo "Debug APK:"
          ls -la composeApp/build/outputs/apk/debug/*.apk || echo "No debug APK found"
          echo "Release APK:"
          ls -la composeApp/build/outputs/apk/release/*.apk || echo "No release APK found"
