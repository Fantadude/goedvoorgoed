name: Build & Upload to AppDB

on:
  workflow_dispatch:
    inputs:
      upload_to_appdb:
        description: 'Upload to AppDB after build?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Build shared Kotlin framework
        run: ./gradlew :shared:embedAndSignAppleFrameworkForXcode

      - name: Build unsigned IPA
        run: |
          cd iosApp
          
          # Build archive without code signing
          xcodebuild \
            -project GoedVoorGoed.xcodeproj \
            -scheme GoedVoorGoed \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GoedVoorGoed.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive
          
          # Create Payload directory for IPA
          mkdir -p build/Payload
          cp -R build/GoedVoorGoed.xcarchive/Products/Applications/GoedVoorGoed.app build/Payload/
          
          # Create IPA file (unsigned)
          cd build && zip -r GoedVoorGoed.ipa Payload
          
          # Show result
          ls -lh GoedVoorGoed.ipa

      - name: Upload IPA to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoedVoorGoed-IPA
          path: iosApp/build/GoedVoorGoed.ipa
          retention-days: 30

      - name: Upload to AppDB (optional)
        if: ${{ github.event.inputs.upload_to_appdb == 'true' }}
        env:
          APPDB_API_KEY: ${{ secrets.APPDB_API_KEY }}
        run: |
          echo "Uploading to AppDB..."
          
          # Upload via AppDB API
          curl -X POST "https://api2.appdb.to/?action=upload" \
            -H "Authorization: Bearer $APPDB_API_KEY" \
            -F "file=@iosApp/build/GoedVoorGoed.ipa" \
            -F "name=GoedVoorGoed" \
            -F "version=${{ github.ref_name || '1.0.0' }}" \
            -F "bundle_id=com.example.goedvoorgoed"

      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: iosApp/build/GoedVoorGoed.ipa
          name: "GoedVoorGoed ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "Build Complete!"
          echo "=========================================="
          echo "IPA Location: iosApp/build/GoedVoorGoed.ipa"
          echo "Download from: GitHub Actions Artifacts"
          echo ""
          echo "To upload to AppDB:"
          echo "1. Download the IPA from Artifacts"
          echo "2. Go to https://appdb.to"
          echo "3. Login and click Upload"
          echo "4. Select your IPA file"
          echo "=========================================="
