name: Build iOS Unsigned IPA

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [ main ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
  workflow_dispatch:

jobs:
  build-ios-framework:
    runs-on: macos-latest
    name: Build iOS Kotlin/Native Framework
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle and Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan/dependencies
            ~/.konan/kotlin-native-macos*
          key: ${{ runner.os }}-gradle-konan-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Frameworks
        run: |
          ./gradlew :shared:linkIosSimulatorArm64
          ./gradlew :shared:linkIosArm64 || echo "Arm64 device build may require additional setup"
          ./gradlew :shared:linkIosX64 || echo "X64 simulator build may require additional setup"

      - name: Package Frameworks
        run: |
          mkdir -p ios-frameworks-output
          find shared/build/bin -name "*.framework" -type d -exec cp -R {} ios-frameworks-output/ \; 2>/dev/null || true
          ls -la ios-frameworks-output/ || echo "No frameworks found"

      - name: Upload iOS Frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-shared-frameworks
          path: |
            ios-frameworks-output/
            shared/build/bin/
          if-no-files-found: warn
          retention-days: 14

  build-ios-app:
    runs-on: macos-latest
    name: Build iOS App (Unsigned)
    needs: build-ios-framework
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle and Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-konan-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework
        run: ./gradlew :shared:linkIosSimulatorArm64

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd iosApp
          
          # Create project.yml for xcodegen
          cat > project.yml << 'EOF'
          name: GoedVoorGoed
          targets:
            GoedVoorGoed:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - GoedVoorGoed
              settings:
                base:
                  INFOPLIST_FILE: GoedVoorGoed/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.goedvoorgoed.iosApp
                  CODE_SIGNING_ALLOWED: NO
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGN_IDENTITY: ""
                  PROVISIONING_PROFILE: ""
                  SWIFT_VERSION: "5.0"
                  LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
                  FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../shared/build/bin/iosSimulatorArm64/releaseFramework $(PROJECT_DIR)/../shared/build/bin/iosX64/releaseFramework"
                  OTHER_LDFLAGS: "$(inherited) -framework shared"
              info:
                path: GoedVoorGoed/Info.plist
          EOF
          
          # Generate the Xcode project
          xcodegen generate

      - name: Build for iOS Simulator (Unsigned)
        run: |
          cd iosApp
          
          xcodebuild build \
            -project GoedVoorGoed.xcodeproj \
            -scheme GoedVoorGoed \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            -derivedDataPath build/DerivedData \
            | xcpretty || cat

      - name: Package Simulator App
        run: |
          cd iosApp
          
          # Find the built app
          APP_PATH=$(find build/DerivedData -name "GoedVoorGoed.app" -type d 2>/dev/null | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            
            # Create Payload directory for IPA structure
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            
            # Create IPA (unsigned, simulator only)
            cd build
            zip -r GoedVoorGoed-unsigned-simulator.ipa Payload
            cd ..
            
            echo "Created unsigned simulator IPA"
          else
            echo "App not found, searching..."
            find build -name "*.app" -type d || true
          fi

      - name: Upload iOS Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: |
            iosApp/build/Payload/
            iosApp/build/*.ipa
            iosApp/build/DerivedData/Build/Products/**/*.app
          if-no-files-found: warn
          retention-days: 14

      - name: Build Summary
        if: always()
        run: |
          echo "=== iOS Build Summary ==="
          ls -la iosApp/build/ 2>/dev/null || echo "Build directory not found"
          find iosApp -name "*.ipa" -type f 2>/dev/null || echo "No IPA files found"
